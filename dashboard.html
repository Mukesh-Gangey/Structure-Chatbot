<!DOCTYPE html>
<html>
<head>
    <title>AI Chat Dashboard</title>

    <style>

        body{
            margin:0;
            font-family:Segoe UI;
            background:#f4f7fc;
        }

        .sidebar{
            width:250px;
            height:100vh;
            background:#fff;
            position:fixed;
            border-right:1px solid #ddd;
            padding:20px;
        }

        .main{
            margin-left:250px;
            padding:30px;
        }

        .chat-box{
            background:white;
            height:500px;
            border-radius:15px;
            padding:20px;
            box-shadow:0 0 10px rgba(0,0,0,.1);
        }

    </style>

</head>

<body>

<div class="sidebar">

    <h2>DataMind AI</h2>

    <p>Dashboard</p>
    <p>AI Chat</p>
    <p>Analytics</p>
    <p>Settings</p>

</div>

<div class="main">

    <h1>Welcome Mukesh</h1>

    <div class="chat-box">

        <p>🤖 Hello! How can I help you today?</p>

    </div>

</div>

</body>
</html>
